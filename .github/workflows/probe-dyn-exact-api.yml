name: DYN Exact API Probe

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  dyn-exact-api-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DYN exact API probe
        run: python3 tools/probe_dyn_exact_api.py

      - name: Show result preview
        run: |
          echo "Generated files:"
          find dyn-exact-api-results -type f -print
          echo ""
          echo "Preview:"
          sed -n '1,520p' dyn-exact-api-results/dyn-exact-api-probe.txt

      - name: Upload DYN exact API probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyn-exact-api-probe
          path: dyn-exact-api-results/
          if-no-files-found: error
