name: DYN Widget API Probe

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  dyn-widget-api-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DYN widget/API probe
        run: python3 tools/probe_dyn_widget_api.py

      - name: Show result preview
        run: |
          echo "Generated files:"
          find dyn-widget-results -type f -print
          echo ""
          echo "Preview:"
          sed -n '1,420p' dyn-widget-results/dyn-widget-api-probe.txt

      - name: Upload DYN widget/API probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyn-widget-api-probe
          path: dyn-widget-results/
          if-no-files-found: error
