name: Discovery Eurosport Probe No Upload

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/probe_discovery_eurosport.py"
      - ".github/workflows/probe-discovery-eurosport-no-upload.yml"

permissions:
  contents: read

jobs:
  discovery-eurosport-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          echo "=== tools ==="
          ls -la tools || true
          echo "=== workflows ==="
          ls -la .github/workflows || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python3 -m py_compile tools/probe_discovery_eurosport.py

      - name: Run Discovery/Eurosport probe
        run: python3 tools/probe_discovery_eurosport.py

      - name: Print candidates to log
        if: always()
        run: |
          echo "================ DISCOVERY EUROSPORT CANDIDATES ================"
          if [ -f discovery-eurosport-results/discovery-eurosport-candidates.txt ]; then
            cat discovery-eurosport-results/discovery-eurosport-candidates.txt
          else
            echo "candidates file missing"
          fi
          echo "================ DISCOVERY EUROSPORT PROBE HEAD ================"
          if [ -f discovery-eurosport-results/discovery-eurosport-probe.txt ]; then
            sed -n '1,1800p' discovery-eurosport-results/discovery-eurosport-probe.txt
          else
            echo "probe file missing"
          fi

      - name: Write job summary
        if: always()
        run: |
          {
            echo "# Discovery/Eurosport Probe"
            echo ""
            echo "## Generated files"
            find discovery-eurosport-results -type f -print 2>/dev/null || true
            echo ""
            echo "## Candidates"
            echo '```text'
            if [ -f discovery-eurosport-results/discovery-eurosport-candidates.txt ]; then
              sed -n '1,500p' discovery-eurosport-results/discovery-eurosport-candidates.txt
            else
              echo "candidates file missing"
            fi
            echo '```'
            echo ""
            echo "## Probe head"
            echo '```text'
            if [ -f discovery-eurosport-results/discovery-eurosport-probe.txt ]; then
              sed -n '1,1000p' discovery-eurosport-results/discovery-eurosport-probe.txt
            else
              echo "probe file missing"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pack results locally
        if: always()
        run: |
          tar -czf discovery-eurosport-results.tgz discovery-eurosport-results 2>/dev/null || true
          ls -lh discovery-eurosport-results.tgz 2>/dev/null || true
          echo "No artifact upload is used in this workflow."
