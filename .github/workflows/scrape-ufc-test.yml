name: Scrape UFC Test

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scrape-ufc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run UFC scraper test
        run: python3 tools/scrape_ufc_test.py

      - name: Show result preview
        run: |
          echo "Generated files:"
          find ufc-results -type f -print
          echo ""
          echo "Preview:"
          sed -n '1,240p' ufc-results/ufc-events.txt

      - name: Upload UFC scraper artifact
        uses: actions/upload-artifact@v4
        with:
          name: ufc-scraper-test
          path: ufc-results/
          if-no-files-found: error
