name: DYN ContentDesk Probe

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  dyn-contentdesk-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DYN ContentDesk probe
        run: python3 tools/probe_dyn_contentdesk.py

      - name: Show result preview
        run: |
          echo "Generated files:"
          find dyn-contentdesk-results -type f -print
          echo ""
          echo "Preview:"
          sed -n '1,520p' dyn-contentdesk-results/dyn-contentdesk-probe.txt

      - name: Upload DYN ContentDesk probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyn-contentdesk-probe
          path: dyn-contentdesk-results/
          if-no-files-found: error
