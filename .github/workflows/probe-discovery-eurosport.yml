name: Discovery Eurosport Probe

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  discovery-eurosport-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Discovery/Eurosport probe
        run: python3 tools/probe_discovery_eurosport.py

      - name: Show result preview
        run: |
          echo "Generated files:"
          find discovery-eurosport-results -type f -print
          echo ""
          echo "Preview candidates:"
          sed -n '1,260p' discovery-eurosport-results/discovery-eurosport-candidates.txt
          echo ""
          echo "Preview full:"
          sed -n '1,700p' discovery-eurosport-results/discovery-eurosport-probe.txt

      - name: Upload Discovery/Eurosport probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-eurosport-probe
          path: discovery-eurosport-results/
          if-no-files-found: error
