name: DYN Fixtures Probe

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  dyn-fixtures-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DYN fixtures probe
        run: python3 tools/probe_dyn_fixtures.py

      - name: Show result preview
        run: |
          echo "Generated files:"
          find dyn-fixtures-results -type f -print
          echo ""
          echo "Preview:"
          sed -n '1,360p' dyn-fixtures-results/dyn-fixtures-probe.txt

      - name: Upload DYN fixtures probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyn-fixtures-probe
          path: dyn-fixtures-results/
          if-no-files-found: error
