name: Discovery Eurosport Probe Fixed

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/probe_discovery_eurosport.py"
      - ".github/workflows/probe-discovery-eurosport-fixed.yml"

permissions:
  contents: read

jobs:
  discovery-eurosport-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          echo "=== tools ==="
          ls -la tools || true
          echo "=== workflows ==="
          ls -la .github/workflows || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python3 -m py_compile tools/probe_discovery_eurosport.py

      - name: Run Discovery/Eurosport probe
        run: python3 tools/probe_discovery_eurosport.py

      - name: Print candidates to log
        if: always()
        run: |
          echo "================ DISCOVERY EUROSPORT CANDIDATES ================"
          cat discovery-eurosport-results/discovery-eurosport-candidates.txt 2>/dev/null || true
          echo "================ DISCOVERY EUROSPORT PROBE HEAD ================"
          sed -n '1,2200p' discovery-eurosport-results/discovery-eurosport-probe.txt 2>/dev/null || true

      - name: Write job summary
        if: always()
        run: |
          {
            echo "# Discovery/Eurosport Probe Fixed"
            echo ""
            echo "## Candidates"
            echo '```text'
            sed -n '1,700p' discovery-eurosport-results/discovery-eurosport-candidates.txt 2>/dev/null || true
            echo '```'
            echo ""
            echo "## Probe head"
            echo '```text'
            sed -n '1,1400p' discovery-eurosport-results/discovery-eurosport-probe.txt 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
